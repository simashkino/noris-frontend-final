<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Noris Messenger — Лавандовый рай</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9f6ff;
            height: 100vh;
            overflow: hidden;
        }

        /* Лавандовая тема */
        :root {
            --lavender-light: #f3e8ff;
            --lavender: #e6d0ff;
            --lavender-dark: #c4a5e3;
            --purple: #9b59b6;
            --purple-dark: #8e44ad;
            --white: #ffffff;
            --gray-light: #f5f5f5;
            --gray: #ddd;
            --text-dark: #4a4a4a;
            --text-light: #7f8c8d;
        }

        /* Аутентификация */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e8d5ff 0%, #d4b8ff 100%);
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(155, 89, 182, 0.2);
            text-align: center;
        }

        .auth-card h1 {
            font-size: 36px;
            color: var(--purple);
            margin-bottom: 8px;
        }

        .auth-card .sub {
            color: var(--text-light);
            margin-bottom: 32px;
        }

        .auth-card input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 16px;
            background: var(--gray-light);
            border: 1px solid var(--gray);
            border-radius: 24px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .auth-card input:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(155, 89, 182, 0.1);
        }

        .auth-card button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--purple), var(--purple-dark));
            border: none;
            border-radius: 28px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s;
        }

        .auth-card button:hover {
            transform: translateY(-2px);
        }

        .secondary-btn {
            background: transparent !important;
            color: var(--purple) !important;
            border: 2px solid var(--purple) !important;
        }

        /* Основной интерфейс */
        .app {
            display: flex;
            height: 100vh;
            background: var(--lavender-light);
        }

        .sidebar {
            width: 320px;
            background: var(--white);
            border-right: 1px solid var(--lavender);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.05);
        }

        .profile {
            padding: 24px 20px;
            background: linear-gradient(135deg, var(--lavender), var(--lavender-light));
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--lavender);
        }

        .profile img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--white);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-weight: 700;
            font-size: 18px;
            color: var(--purple-dark);
        }

        .profile-username {
            font-size: 13px;
            color: var(--text-light);
        }

        .search-section {
            padding: 16px;
            border-bottom: 1px solid var(--lavender);
        }

        .search-box {
            display: flex;
            gap: 8px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            background: var(--gray-light);
            border: 1px solid var(--gray);
            border-radius: 24px;
            font-size: 14px;
        }

        .search-box button {
            padding: 10px 18px;
            background: var(--purple);
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }

        .search-results {
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .search-result-item {
            padding: 10px;
            background: var(--gray-light);
            border-radius: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-result-item:hover {
            background: var(--lavender);
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--purple);
            letter-spacing: 1px;
            padding: 20px 16px 8px 16px;
        }

        .contacts-list, .chats-list {
            padding: 0 12px;
        }

        .contact-item, .chat-item {
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            margin-bottom: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .contact-item:hover, .chat-item:hover {
            background: var(--lavender-light);
        }

        .contact-item.active, .chat-item.active {
            background: var(--lavender);
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--white);
        }

        .chat-header {
            padding: 20px 24px;
            background: var(--white);
            border-bottom: 1px solid var(--lavender);
            font-weight: 600;
            font-size: 18px;
            color: var(--purple-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fefefe;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 75%;
        }

        .message-mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-bubble {
            background: var(--lavender-light);
            padding: 12px 16px;
            border-radius: 20px;
            word-break: break-word;
            max-width: 100%;
        }

        .message-mine .message-bubble {
            background: var(--lavender);
        }

        .message-text {
            font-size: 15px;
            color: var(--text-dark);
        }

        .message-time {
            font-size: 10px;
            color: var(--text-light);
            margin-top: 6px;
            text-align: right;
        }

        /* Панель ввода с кнопками */
        .input-area {
            padding: 16px 20px;
            background: var(--white);
            border-top: 1px solid var(--lavender);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: var(--gray-light);
            border: 1px solid var(--gray);
            border-radius: 28px;
            font-size: 15px;
        }

        .input-area input:focus {
            outline: none;
            border-color: var(--purple);
        }

        .input-area button {
            padding: 12px 24px;
            background: var(--purple);
            border: none;
            border-radius: 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: var(--purple-dark);
        }

        .icon-btn {
            background: var(--lavender-light);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--lavender);
            transform: scale(1.05);
        }

        .file-input {
            display: none;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-align: center;
            flex-direction: column;
            gap: 16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--purple-dark);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                transition: left 0.3s;
                z-index: 100;
                height: 100%;
                width: 280px;
            }
            .sidebar.open {
                left: 0;
            }
            .message {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
<div id="root" class="auth-container"><div class="auth-card"><h1>✨ Noris</h1><div class="sub">Загрузка...</div></div></div>

<script>
    // ==================== НАСТРОЙКИ ====================
    const API_BASE = 'https://noris.onrender.com/api';
    const SOCKET_URL = 'https://noris.onrender.com';
    
    let token = localStorage.getItem('token');
    let currentUser = null;
    let socket = null;
    let activeChat = null;
    let messages = [];
    let contacts = [];
    let chats = [];
    let pendingUserId = null;

    // ==================== ВСПОМОГАТЕЛЬНЫЕ ====================
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        if (isError) toast.style.background = '#e74c3c';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function apiRequest(endpoint, options = {}) {
        try {
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(API_BASE + endpoint, { ...options, headers });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || 'Ошибка');
            return data;
        } catch (error) {
            showToast(error.message, true);
            throw error;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== SOCKET ====================
    function initSocket() {
        if (socket) socket.close();
        if (!token) return;
        socket = io(SOCKET_URL, { auth: { token }, transports: ['websocket'] });
        socket.on('new_message', (msg) => {
            if (activeChat && (msg.chatId === activeChat.id || msg.senderId === activeChat.id)) {
                messages.push(msg);
                renderMessages();
            }
            loadChats();
        });
    }

    // ==================== ЗАГРУЗКА ДАННЫХ ====================
    async function loadUser() {
        try {
            const data = await apiRequest('/users/me');
            if (data.user) { currentUser = data.user; return true; }
            return false;
        } catch { return false; }
    }

    async function loadContacts() {
        try { contacts = await apiRequest('/users/contacts'); renderContacts(); } 
        catch { contacts = []; renderContacts(); }
    }

    async function loadChats() {
        try { chats = await apiRequest('/chats'); renderChats(); } 
        catch { chats = []; renderChats(); }
    }

    async function loadMessages(chatId) {
        try { messages = await apiRequest('/messages/' + chatId); renderMessages(); } 
        catch { messages = []; renderMessages(); }
    }

    // ==================== ОТРИСОВКА ====================
    function renderContacts() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        if (!contacts.length) { container.innerHTML = '<div style="color:#aaa; padding:12px;">Нет контактов</div>'; return; }
        container.innerHTML = contacts.map(c => `
            <div class="contact-item" onclick="openChat({id:'${c.id}', name:'${escapeHtml(c.firstName + ' ' + c.lastName || c.username)}', type:'user'})">
                <i class="fas fa-user-circle" style="font-size:28px; color:var(--purple);"></i>
                <div><strong>${escapeHtml(c.firstName || '')} ${escapeHtml(c.lastName || '')}</strong><br><small>@${escapeHtml(c.username)}</small></div>
            </div>
        `).join('');
    }

    function renderChats() {
        const container = document.getElementById('chatsList');
        if (!container) return;
        if (!chats.length) { container.innerHTML = '<div style="color:#aaa; padding:12px;">Нет чатов</div>'; return; }
        container.innerHTML = chats.map(chat => `
            <div class="chat-item ${activeChat?.id === chat.id ? 'active' : ''}" onclick="openChat({id:'${chat.id}', name:'${escapeHtml(chat.name)}', type:'${chat.type || 'user'}'})">
                <i class="fas fa-comment-dots" style="font-size:22px; color:var(--purple);"></i>
                <div><strong>${escapeHtml(chat.name)}</strong></div>
            </div>
        `).join('');
    }

    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        if (!messages.length) { container.innerHTML = '<div class="empty-state"><i class="fas fa-comments" style="font-size:48px; color:var(--lavender);"></i><p>Нет сообщений. Напишите что-нибудь!</p></div>'; return; }
        container.innerHTML = messages.map(msg => {
            const isMine = msg.senderId === currentUser?.id;
            return `
                <div class="message ${isMine ? 'message-mine' : ''}">
                    <div class="message-bubble">
                        <div class="message-text">${escapeHtml(msg.content || '')}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    // ==================== ДЕЙСТВИЯ ====================
    window.openChat = function(chat) {
        activeChat = chat;
        loadMessages(chat.id);
        renderChats();
        if (socket) socket.emit('join_group', chat.id);
    };

    window.sendMessage = async function() {
        const input = document.getElementById('messageInput');
        if (!input || !input.value.trim() || !activeChat || !socket) return;
        const content = input.value.trim();
        socket.emit('send_message', {
            chatId: activeChat.id,
            content: content,
            type: 'text',
            receiverId: activeChat.type === 'user' ? activeChat.id : null
        });
        input.value = '';
    };

    // Отправка файла (изображения, видео, аудио)
    window.sendFile = function() {
        document.getElementById('fileInput').click();
    };

    window.handleFile = async function(e) {
        const file = e.target.files[0];
        if (!file || !activeChat || !socket) return;
        const formData = new FormData();
        formData.append('file', file);
        
        try {
            const response = await fetch(API_BASE + '/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const data = await response.json();
            if (data.url) {
                socket.emit('send_message', {
                    chatId: activeChat.id,
                    content: `📎 ${file.name}: ${data.url}`,
                    type: 'file',
                    receiverId: activeChat.type === 'user' ? activeChat.id : null,
                    fileUrl: data.url,
                    fileName: file.name
                });
            }
        } catch (error) {
            showToast('Ошибка загрузки файла', true);
        }
        e.target.value = '';
    };

    window.searchUsers = async function() {
        const query = document.getElementById('searchInput')?.value;
        if (!query) return;
        try {
            const users = await apiRequest('/users/search?q=' + encodeURIComponent(query));
            const resultsDiv = document.getElementById('searchResults');
            if (!users.length) { resultsDiv.innerHTML = '<div style="padding:8px; color:#aaa;">Ничего не найдено</div>'; return; }
            resultsDiv.innerHTML = users.map(u => `
                <div class="search-result-item" onclick="addContact('${u.id}')">
                    <i class="fas fa-user-plus"></i> @${escapeHtml(u.username)} — ${escapeHtml(u.firstName)} ${escapeHtml(u.lastName)}
                </div>
            `).join('');
        } catch { showToast('Ошибка поиска', true); }
    };

    window.addContact = async function(contactId) {
        try {
            await apiRequest('/users/contact', { method: 'POST', body: JSON.stringify({ contactId }) });
            showToast('✅ Контакт добавлен');
            loadContacts(); loadChats();
        } catch { showToast('Не удалось добавить контакт', true); }
    };

    // ==================== АУТЕНТИФИКАЦИЯ ====================
    window.doLogin = async function() {
        const email = document.getElementById('loginEmail')?.value;
        const password = document.getElementById('loginPassword')?.value;
        if (!email || !password) { showToast('Введите email и пароль', true); return; }
        try {
            const data = await apiRequest('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
            if (data.token) {
                token = data.token; localStorage.setItem('token', token);
                currentUser = data.user;
                initSocket();
                showMainApp();
                showToast('Добро пожаловать, ' + currentUser.firstName + '!');
            }
        } catch { showToast('Ошибка входа', true); }
    };

    window.doRegister = async function() {
        const email = document.getElementById('regEmail')?.value;
        const password = document.getElementById('regPassword')?.value;
        const firstName = document.getElementById('regFirstName')?.value;
        const lastName = document.getElementById('regLastName')?.value;
        const username = document.getElementById('regUsername')?.value;
        if (!email || !password || !firstName || !lastName || !username) { showToast('Заполните все поля', true); return; }
        if (!/^[a-zA-Z0-9_]+$/.test(username)) { showToast('Никнейм только латиница, цифры, _', true); return; }
        try {
            const data = await apiRequest('/auth/register', { method: 'POST', body: JSON.stringify({ email, password, firstName, lastName, username }) });
            if (data.userId) {
                pendingUserId = data.userId;
                showToast('✅ Аккаунт зарегистрирован! Теперь войдите.');
                showLoginScreen();
            }
        } catch { showToast('Ошибка регистрации', true); }
    };

    window.doVerify = async function() {
        const code = document.getElementById('verifyCode')?.value;
        if (!code || !pendingUserId) { showToast('Введите код', true); return; }
        try {
            const data = await apiRequest('/auth/verify', { method: 'POST', body: JSON.stringify({ userId: pendingUserId, code }) });
            if (data.token) {
                token = data.token; localStorage.setItem('token', token);
                currentUser = data.user; pendingUserId = null;
                initSocket();
                showMainApp();
                showToast('Добро пожаловать в Noris!');
            }
        } catch { showToast('Неверный код', true); }
    };

    window.logout = function() {
        localStorage.removeItem('token');
        token = null; currentUser = null;
        if (socket) socket.close();
        showLoginScreen();
        showToast('Вы вышли из аккаунта');
    };

    // ==================== ЭКРАНЫ ====================
    function showLoginScreen() {
        document.getElementById('root').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>✨ Noris</h1>
                    <div class="sub">Лавандовый рай общения</div>
                    <input type="email" id="loginEmail" placeholder="Email">
                    <input type="password" id="loginPassword" placeholder="Пароль">
                    <button onclick="doLogin()">Войти</button>
                    <button class="secondary-btn" onclick="showRegisterScreen()">Создать аккаунт</button>
                </div>
            </div>
        `;
    }

    function showRegisterScreen() {
        document.getElementById('root').innerHTML = `
            <div class="auth-container">
                <div class="auth-card">
                    <h1>Регистрация</h1>
                    <div class="sub">Присоединяйся к Noris</div>
                    <input type="email" id="regEmail" placeholder="Email">
                    <input type="password" id="regPassword" placeholder="Пароль (мин 6)">
                    <input type="text" id="regFirstName" placeholder="Имя">
                    <input type="text" id="regLastName" placeholder="Фамилия">
                    <input type="text" id="regUsername" placeholder="Никнейм (латиница, цифры, _)">
                    <button onclick="doRegister()">Зарегистрироваться</button>
                    <button class="secondary-btn" onclick="showLoginScreen()">Назад</button>
                </div>
            </div>
        `;
    }

    async function showMainApp() {
        if (!currentUser) {
            const ok = await loadUser();
            if (!ok) { showLoginScreen(); return; }
        }
        document.getElementById('root').innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="profile">
                        <img src="${currentUser?.avatar || 'https://ui-avatars.com/api/?name='+(currentUser?.firstName || '')+'+'+(currentUser?.lastName || '')+'&background=9b59b6&color=fff'}" alt="">
                        <div class="profile-info">
                            <div class="profile-name">${escapeHtml(currentUser?.firstName || '')} ${escapeHtml(currentUser?.lastName || '')}</div>
                            <div class="profile-username">@${escapeHtml(currentUser?.username || '')}</div>
                        </div>
                        <button onclick="logout()" style="background:none; border:none; font-size:24px; cursor:pointer;">🚪</button>
                    </div>
                    <div class="search-section">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="Поиск по никнейму...">
                            <button onclick="searchUsers()"><i class="fas fa-search"></i></button>
                        </div>
                        <div id="searchResults" class="search-results"></div>
                    </div>
                    <div class="section-title"><i class="fas fa-address-book"></i> КОНТАКТЫ</div>
                    <div id="contactsList" class="contacts-list"></div>
                    <div class="section-title"><i class="fas fa-comments"></i> ЧАТЫ</div>
                    <div id="chatsList" class="chats-list"></div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <span>${activeChat ? escapeHtml(activeChat.name) : 'Noris Messenger'}</span>
                        <i class="fas fa-phone-alt" style="color:var(--purple); cursor:pointer;" onclick="showToast('Голосовые вызовы скоро')"></i>
                    </div>
                    <div id="messagesContainer" class="messages-container"></div>
                    <div class="input-area">
                        <button class="icon-btn" onclick="sendFile()"><i class="fas fa-paperclip"></i></button>
                        <button class="icon-btn" onclick="showToast('Голосовые сообщения скоро')"><i class="fas fa-microphone"></i></button>
                        <input type="text" id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Отправить</button>
                        <input type="file" id="fileInput" class="file-input" onchange="handleFile(event)">
                    </div>
                </div>
            </div>
        `;
        await loadContacts();
        await loadChats();
        if (activeChat) await loadMessages(activeChat.id);
    }

    // ==================== СТАРТ ====================
    async function init() {
        if (token) {
            const ok = await loadUser();
            if (ok && currentUser) {
                initSocket();
                showMainApp();
                return;
            }
        }
        showLoginScreen();
    }
    init();
</script>
</body>
</html>
