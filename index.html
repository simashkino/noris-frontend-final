<!DOCTYPE html>
<html>
<head>
    <title>Noris Messenger</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0e1621; color: #fff; }
        .auth { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0e1621 0%, #17212b 100%); }
        .auth-card { background: #17212b; padding: 40px; border-radius: 24px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .auth-card h1 { text-align: center; margin-bottom: 30px; font-size: 32px; color: #fff; }
        .auth-card input { width: 100%; padding: 12px 16px; margin-bottom: 12px; background: #242f3d; border: none; border-radius: 12px; color: #fff; font-size: 16px; }
        .auth-card button { width: 100%; padding: 12px; background: #2b5278; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
        .app { display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #17212b; border-right: 1px solid #2b2f36; display: flex; flex-direction: column; overflow-y: auto; }
        .profile { padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2b2f36; }
        .profile img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; }
        .search-box { padding: 16px; }
        .search-box input { width: 100%; padding: 10px 14px; background: #242f3d; border: none; border-radius: 20px; color: #fff; }
        .search-box button { margin-top: 8px; width: 100%; padding: 10px; background: #2b5278; border: none; border-radius: 20px; color: #fff; cursor: pointer; }
        .chats, .contacts { padding: 16px; }
        .chats h3, .contacts h3 { font-size: 12px; color: #6c7883; margin-bottom: 12px; }
        .chat-item, .contact-item { padding: 10px; border-radius: 12px; cursor: pointer; margin-bottom: 4px; background: #17212b; }
        .chat-item:hover, .contact-item:hover { background: #242f3d; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 16px 20px; background: #17212b; border-bottom: 1px solid #2b2f36; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; gap: 12px; max-width: 70%; }
        .message.mine { align-self: flex-end; flex-direction: row-reverse; }
        .message-content { background: #242f3d; padding: 10px 14px; border-radius: 18px; }
        .message.mine .message-content { background: #2b5278; }
        .message-content p { font-size: 14px; word-break: break-word; }
        .message-content small { font-size: 10px; color: #6c7883; display: block; margin-top: 4px; }
        .input-area { padding: 16px 20px; background: #17212b; display: flex; gap: 12px; border-top: 1px solid #2b2f36; }
        .input-area input { flex: 1; padding: 12px 16px; background: #242f3d; border: none; border-radius: 24px; color: #fff; }
        .input-area button { padding: 12px 24px; background: #2b5278; border: none; border-radius: 24px; color: #fff; cursor: pointer; }
        .placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #6c7883; }
        .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 8px; }
        .status.online { background: #4caf50; }
        .loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 24px; }
    </style>
</head>
<body>
<div id="root">Загрузка...</div>

<script>
    // ============ КОНФИГ ============
    const API_URL = 'https://noris.onrender.com/api';
    const SOCKET_URL = 'https://noris.onrender.com';
    
    let token = localStorage.getItem('token');
    let user = null;
    let socket = null;
    let activeChat = null;
    let messages = [];
    let chats = [];
    let contacts = [];
    
    // ============ ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ============
    function showError(msg) {
        alert('❌ ' + msg);
    }
    
    async function apiCall(endpoint, options = {}) {
        try {
            const res = await fetch(API_URL + endpoint, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
                    ...options.headers
                }
            });
            return await res.json();
        } catch (e) {
            showError('Нет связи с сервером: ' + e.message);
            return { error: 'Network error' };
        }
    }
    
    // ============ ОТРИСОВКА СТРАНИЦ ============
    function showLogin() {
        document.getElementById('root').innerHTML = `
            <div class="auth">
                <div class="auth-card">
                    <h1>✨ Noris</h1>
                    <input id="email" placeholder="Email" type="email">
                    <input id="password" placeholder="Пароль" type="password">
                    <button onclick="doLogin()">Войти</button>
                    <button onclick="showRegister()">Создать аккаунт</button>
                </div>
            </div>
        `;
    }
    
    function showRegister() {
        document.getElementById('root').innerHTML = `
            <div class="auth">
                <div class="auth-card">
                    <h1>Регистрация</h1>
                    <input id="regEmail" placeholder="Email">
                    <input id="regPassword" placeholder="Пароль" type="password">
                    <input id="regFirstName" placeholder="Имя">
                    <input id="regLastName" placeholder="Фамилия">
                    <input id="regUsername" placeholder="Никнейм (латиница, цифры, _)">
                    <button onclick="doRegister()">Зарегистрироваться</button>
                    <button onclick="showLogin()">Назад</button>
                </div>
            </div>
        `;
    }
    
    function showVerify(userId) {
        document.getElementById('root').innerHTML = `
            <div class="auth">
                <div class="auth-card">
                    <h1>Подтверждение</h1>
                    <p>Введите код из письма (ссылка в логах Render)</p>
                    <input id="verifyCode" placeholder="Код">
                    <button onclick="doVerify('${userId}')">Подтвердить</button>
                </div>
            </div>
        `;
    }
    
    // ============ API ВЫЗОВЫ ============
    async function doLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if (!email || !password) {
            showError('Введите email и пароль');
            return;
        }
        const data = await apiCall('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        if (data.token) {
            token = data.token;
            localStorage.setItem('token', token);
            user = data.user;
            initSocket();
            showMain();
        } else {
            showError(data.error || 'Ошибка входа');
        }
    }
    
    async function doRegister() {
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const firstName = document.getElementById('regFirstName').value;
        const lastName = document.getElementById('regLastName').value;
        const username = document.getElementById('regUsername').value;
        
        if (!email || !password || !firstName || !lastName || !username) {
            showError('Заполните все поля');
            return;
        }
        if (!/^[a-zA-Z0-9_]+$/.test(username)) {
            showError('Никнейм может содержать только латиницу, цифры и _');
            return;
        }
        
        const data = await apiCall('/auth/register', { method: 'POST', body: JSON.stringify({ email, password, firstName, lastName, username }) });
        if (data.userId) {
            alert('✅ Код подтверждения отправлен на email! Проверьте почту (ссылка в логах Render)');
            showVerify(data.userId);
        } else {
            showError(data.error || 'Ошибка регистрации');
        }
    }
    
    async function doVerify(userId) {
        const code = document.getElementById('verifyCode').value;
        const data = await apiCall('/auth/verify', { method: 'POST', body: JSON.stringify({ userId, code }) });
        if (data.token) {
            token = data.token;
            localStorage.setItem('token', token);
            user = data.user;
            initSocket();
            showMain();
        } else {
            showError('Неверный код');
        }
    }
    
    // ============ SOCKET ============
    function initSocket() {
        if (socket) socket.close();
        socket = io(SOCKET_URL, { auth: { token }, transports: ['websocket'] });
        socket.on('new_message', (msg) => {
            if (activeChat && (msg.chatId === activeChat.id || msg.senderId === activeChat.id)) {
                messages.push(msg);
                renderMessages();
            }
            fetchChats();
        });
        socket.on('connect', () => console.log('✅ Socket connected'));
        socket.on('disconnect', () => console.log('❌ Socket disconnected'));
    }
    
    // ============ ЗАГРУЗКА ДАННЫХ ============
    async function fetchChats() {
        const data = await apiCall('/chats');
        if (Array.isArray(data)) chats = data;
        renderChats();
    }
    
    async function fetchContacts() {
        const data = await apiCall('/users/contacts');
        if (Array.isArray(data)) contacts = data;
        renderContacts();
    }
    
    async function fetchMessages(chatId) {
        const data = await apiCall('/messages/' + chatId);
        messages = Array.isArray(data) ? data : [];
        renderMessages();
    }
    
    // ============ ДЕЙСТВИЯ ПОЛЬЗОВАТЕЛЯ ============
    window.openChat = function(chat) {
        activeChat = chat;
        fetchMessages(chat.id);
        renderChats();
        if (socket) socket.emit('join_group', chat.id);
    }
    
    window.sendMessage = async function() {
        const input = document.getElementById('messageInput');
        if (!input || !input.value.trim() || !activeChat) return;
        const content = input.value;
        socket.emit('send_message', {
            chatId: activeChat.id,
            content: content,
            type: 'text',
            receiverId: activeChat.type === 'user' ? activeChat.id : null
        });
        input.value = '';
    }
    
    window.searchUsers = async function() {
        const q = document.getElementById('searchInput')?.value;
        if (!q) return;
        const users = await apiCall('/users/search?q=' + q);
        const resultsDiv = document.getElementById('searchResults');
        if (resultsDiv) {
            resultsDiv.innerHTML = users.map(u => `
                <div onclick="addContact('${u.id}')" style="padding:8px;border-radius:8px;cursor:pointer;margin-bottom:4px;background:#242f3d">
                    @${u.username} - ${u.firstName} ${u.lastName}
                </div>
            `).join('');
        }
    }
    
    window.addContact = async function(contactId) {
        await apiCall('/users/contact', { method: 'POST', body: JSON.stringify({ contactId }) });
        alert('✅ Контакт добавлен');
        fetchContacts();
    }
    
    // ============ ОТРИСОВКА ИНТЕРФЕЙСА ============
    function renderChats() {
        const container = document.getElementById('chatsList');
        if (!container) return;
        if (!chats.length) {
            container.innerHTML = '<div style="color:#6c7883">Нет чатов</div>';
            return;
        }
        container.innerHTML = chats.map(chat => `
            <div class="chat-item" onclick="openChat({id:'${chat.id}',name:'${chat.name}',type:'${chat.type || 'user'}'})" style="background:${activeChat?.id === chat.id ? '#2b5278' : 'transparent'}">
                ${chat.name}
            </div>
        `).join('');
    }
    
    function renderContacts() {
        const container = document.getElementById('contactsList');
        if (!container) return;
        if (!contacts.length) {
            container.innerHTML = '<div style="color:#6c7883">Нет контактов</div>';
            return;
        }
        container.innerHTML = contacts.map(c => `
            <div class="contact-item" onclick="openChat({id:'${c.id}',name:'${c.username}',type:'user',avatar:'${c.avatar}'})">
                ${c.firstName} ${c.lastName} (@${c.username})
                <span class="status ${c.isOnline ? 'online' : 'offline'}"></span>
            </div>
        `).join('');
    }
    
    function renderMessages() {
        const container = document.getElementById('messages');
        if (!container) return;
        if (!messages.length) {
            container.innerHTML = '<div style="color:#6c7883">Нет сообщений</div>';
            return;
        }
        container.innerHTML = messages.map(msg => `
            <div class="message ${msg.senderId === user?.id ? 'mine' : 'theirs'}">
                <div class="message-content">
                    <p>${escapeHtml(msg.content || msg.fileUrl || '')}</p>
                    <small>${new Date(msg.timestamp).toLocaleTimeString()}</small>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showMain() {
        document.getElementById('root').innerHTML = `
            <div class="app">
                <div class="sidebar">
                    <div class="profile">
                        <img src="${user?.avatar || 'https://ui-avatars.com/api/?name='+user?.firstName+'+'+user?.lastName+'&background=2b5278&color=fff'}" alt="">
                        <div><strong>${user?.firstName} ${user?.lastName}</strong><br><span>@${user?.username}</span></div>
                    </div>
                    <div class="search-box">
                        <input id="searchInput" placeholder="Поиск по никнейму...">
                        <button onclick="searchUsers()">Найти</button>
                    </div>
                    <div id="searchResults" style="padding:8px 16px"></div>
                    <div class="contacts">
                        <h3>КОНТАКТЫ</h3>
                        <div id="contactsList"></div>
                    </div>
                    <div class="chats">
                        <h3>ЧАТЫ</h3>
                        <div id="chatsList"></div>
                    </div>
                </div>
                <div class="chat-area">
                    <div class="chat-header">
                        <strong>${activeChat ? activeChat.name : 'Noris Messenger'}</strong>
                    </div>
                    <div class="messages" id="messages"></div>
                    <div class="input-area">
                        <input id="messageInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                        <button onclick="sendMessage()">➤</button>
                    </div>
                </div>
            </div>
        `;
        fetchChats();
        fetchContacts();
        renderMessages();
    }
    
    // ============ ЗАПУСК ============
    if (token) {
        apiCall('/users/me').then(data => {
            if (data.user) {
                user = data.user;
                initSocket();
                showMain();
            } else {
                token = null;
                localStorage.removeItem('token');
                showLogin();
            }
        }).catch(() => {
            token = null;
            localStorage.removeItem('token');
            showLogin();
        });
    } else {
        showLogin();
    }
</script>
</body>
</html>
